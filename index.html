<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
 <meta name="robots" content="noindex, nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Isolophilia Community</title>
<!--<meta http-equiv="Content-Security-Policy" content="img-src 'self' data: https://*.googleusercontent.com https://res.cloudinary.com;">-->
   <meta http-equiv="Content-Security-Policy" content="
  default-src 'self'; 
  script-src 'self' 'unsafe-inline'; 
  style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://fonts.googleapis.com; 
  img-src 'self' data: https://*.googleusercontent.com https://res.cloudinary.com; 
  font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com;
  connect-src 'self' ws: wss:;
">
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#00f7ff">
</head>
<body>

<noscript>
  <div style="position:fixed; top:0; left:0; width:100%; height:100%; background:#000; color:#00f7ff; z-index:9999; display:flex; align-items:center; justify-content:center; font-family:sans-serif; text-align:center;">
    <h1>SECURITY ALERT</h1>
    <p>JavaScript is required to access Isolophilia Community.<br>Please enable it to continue.</p>
  </div>
</noscript>

  <!-- HEADER START -->
  <header class="chat-header">
    <div class="header-left">
      <div class="logo">
        <img src="logo.png" alt="Logo">
      </div>
      <div class="title-box">
        <div class="title-row">
          <h1>ISOLOPHILIA COMMUNITY</h1>
          <span class="badge beta">Beta</span>
          <span class="badge version">v1.09</span>
        </div>
        <p class="live-status">
          Online: <span id="online">0 Live</span>
         <span class="online-dot hidden" id="onlineDot"></span>       
        </p>
      </div>
    </div>
 <!--   <div class="menu">⋮</div> -->
<div class="menu">
  ⋮
  <div class="menu-dropdown">
    <button id="toggleSidebar">
      <i class="fa-solid fa-users"></i> Member List
    </button>
    <button id="openBanListBtn" style="color: #00f7ff; font-weight: bold;">
    <i class="fa-solid fa-users-gear"></i> Manage Users
</button>
    <button id="logoutBtn"> <!--Logout</button> -->
    <i class="fa-solid fa-right-from-bracket"></i>
   Logout</button>
  </div>
</div>
  </header>
  <!-- HEADER END -->
   <p id="dateDisplay" style="text-align: center; color: #fff; font-size: 14px; margin-top: 10px;"></p>
  <!-- CHAT AREA START -->
  <div class="chat-wrapper">

    <aside class="sidebar">
<div class="sidebar-header" id="sidebarOnlineHeader">
    <i class="fa-solid fa-users"></i> Online Users
</div>
      <div class="sidebar-content">
        </div>
    </aside>
    <div class="chat-bg">
      <div id="chat" class="chat"></div>
      <button id="newMsgBtn" class="hidden">
        <i class="fa-regular fa-turn-down"></i>
      </button>
</div>
</div>
  <div class="input-container" style="position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); width: calc(100% - 24px); max-width: 480px; z-index: 1000;">
    <div id="replyPreview" class="reply-preview hidden">
        <div class="reply-content">
            <span id="replyUser"></span>
            <p id="replyText"></p>
        </div>
        <button id="cancelReply">×</button>
    </div>

    <div class="input-bar" style="position: relative; bottom: 0; left: -8px; transform: none; width: 100%;">
        <input type="text" id="messageInput" placeholder="Type a message..."/>
        <div class="sendBtn">
            <button id="sendBtn">
                <i class="fa-solid fa-paper-plane"></i>
            </button>
        </div>
    </div>
  </div>

<script src="/app.js"></script>
<div id="userModal" class="modal hidden">
  <div class="modal-content">
    <div class="modal-banner"></div> <div class="modal-body">
      <img id="modalAvatar" src="" alt="User">
      <h2 id="modalName">User Name</h2>
      <p id="modalEmail">user@example.com</p>
       <div id="adminActions"></div> 
      <button id="closeModal">Back to Chat</button>
    </div>
  </div>
</div>

<div id="banListModal" class="hidden" style="position: fixed; inset: 0; z-index: 10000; display: flex; align-items: center; justify-content: center; padding: 35px;">
    <div id="closeBanListOverlay" style="position: absolute; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px);"></div>

    <div style="position: relative; width: 100%; max-width: 400px; background: linear-gradient(135deg, #050505 0%, #001f3f 40%, #0074D9 100%); border: 1px solid rgba(0, 247, 255, 0.4); border-radius: 20px; padding: 10px; box-shadow: 0 0 25px rgba(0, 247, 255, 0.2); animation: panelPop 0.3s ease-out;">

        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <div style="display: flex; align-items: center; gap: 0;">
                <div style="background: rgba(255, 255, 255, 0); padding: 8px; border-radius: 10px; color: #00f7ff;">
                    <i class="fa-solid fa-users-gear"></i>
                </div>
                <div>
                    <h3 style="margin: 0; color: #fff; font-size: 1rem; text-shadow: 0 0 10px rgba(0, 247, 255, 0.5);">Manage Users</h3>
                    <p style="margin: 0; color: #64748b; font-size: 0.7rem;">Community Control</p>
                </div>
            </div>

<button id="backToManageBtn" class="hidden" style="background: rgba(0, 247, 255, 0.1); border: 1px solid rgba(0, 247, 255, 0.4); color: #00f7ff; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; margin-right: 2px;" title="Back to Manage Users">
    <i class="fa-solid fa-arrow-left" style="font-size: 0.8rem;"></i>
</button>

<button id="viewReportsBtn" style="background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.4); color: #ef4444; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; margin-right: 2px;" title="View Reports">
    <i class="fa-solid fa-flag" style="font-size: 0.8rem;"></i>
</button>

            <button id="closeBanList" style="background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; width: 30px; height: 30px; border-radius: 50%; cursor: pointer;">&times;</button>
        </div>

<div id="adminStatsBar" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 15px; background: rgba(0,0,0,0.4); padding: 12px; border-radius: 15px; border: 1px solid rgba(0, 247, 255, 0.25); box-shadow: inset 0 0 10px rgba(0, 247, 255, 0.1);">
    <div style="text-align: center; color: #64748b; font-size: 0.75rem; grid-column: span 2; font-family: sans-serif;">
        <i class="fa-solid fa-circle-notch fa-spin"></i> Loading Dashboard...
    </div>
</div>

        <div style="background: rgba(0,0,0,0.4); border: 1px solid rgba(0, 247, 255, 0.2); border-radius: 40px; padding: 8px 12px; display: flex; align-items: center; gap: 8px; margin-bottom: 15px;">
            <i class="fa-solid fa-magnifying-glass" style="color: #00f7ff; font-size: 0.8rem;"></i>
            <input type="text" id="userSearch" placeholder="Search members..." style="background: transparent; border: none; color: #fff; outline: none; width: 100%; font-size: 0.85rem;">
        </div>

        <div style="max-height: 300px; overflow-y: auto; border-radius: 20px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.05);">
            <table style="width: 100%; border-collapse: collapse;">
                <thead style="background: rgba(0,0,0,0.5); position: sticky; top: 0; z-index: 1;">
                    <tr>
                        <th style="text-align: left; padding: 10px; color: #00f7ff; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px;">Member</th>
                        <th style="text-align: right; padding: 10px; color: #64748b; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px;">Actions</th>
                    </tr>
                </thead>
                <tbody id="banListContent">
                </tbody>
            </table>
        </div>
    </div>
</div>

</body> 
</html>
