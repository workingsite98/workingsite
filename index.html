<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Isolophilia Community</title>
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- HEADER START -->
  <header class="chat-header">
    <div class="header-left">
      <div class="logo">
        <img src="logo.png" alt="Logo">
      </div>
      <div class="title-box">
        <div class="title-row">
          <h1>ISOLOPHILIA COMMUNITY</h1>
          <span class="badge beta">Beta</span>
          <span class="badge version">v1.09</span>
        </div>
        <p class="live-status">
          Online: <span id="online">0 Live</span>
         <span class="online-dot hidden" id="onlineDot"></span>       
        </p>
      </div>
    </div>
 <!--   <div class="menu">⋮</div> -->
<div class="menu">
  ⋮
  <div class="menu-dropdown">
    <button id="logoutBtn"> <!--Logout</button> -->
    <i class="fa-solid fa-right-from-bracket"></i>
   Logout</button>
  </div>
</div>
  </header>
  <!-- HEADER END -->
   <p id="dateDisplay" style="text-align: center; color: #fff; font-size: 14px; margin-top: 10px;"></p>
  <!-- CHAT AREA START -->
  <div class="chat-wrapper">
    <div class="chat-bg">
      <div id="chat" class="chat"></div>
     <button id="newMsgBtn" class="hidden">
      <i class="fa-regular fa-turn-down"></i>
   </button>

    <div class="message">
  <div class="msg-text">
    <!-- Message Text -->
    Hello, how are you?
  </div>

  <!-- Message Metadata (status) -->
  <div class="message-meta">
    <span class="status">
      <svg class="tick small hidden" viewBox="0 0 20 20">
        <polyline points="4 11 8 15 16 6" />
      </svg>
      <svg class="tick big hidden" viewBox="0 0 20 20">
        <polyline points="4 11 8 15 16 6" />
      </svg>
    </span>
  </div>
</div>

    </div>
  </div>

  <div class="input-bar">
    <input type="text" id="messageInput" placeholder="Type a message..."/>
     <div class="sendBtn">
    <button id="sendBtn"><!--➤</button>-->
   <i class="fa-solid fa-paper-plane"></i>
  </button>
  </div> 
</div>  <!--for testing only -->
  <!-- Scroll-to-bottom button -->
<script src="/app.js"></script>
</body>
</html>
