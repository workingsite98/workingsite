<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
 <meta name="robots" content="noindex, nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Isolophilia Community</title>
<!--   <meta http-equiv="Content-Security-Policy" content="img-src 'self' data: https://*.googleusercontent.com https://res.cloudinary.com;"> -->
   <meta http-equiv="Content-Security-Policy" content="
  default-src 'self'; 
  script-src 'self' 'unsafe-inline'; 
  style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://fonts.googleapis.com; 
  img-src 'self' data: https://*.googleusercontent.com https://res.cloudinary.com; 
  font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com;
  connect-src 'self' ws: wss:;
">
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="style.css">
</head>
<body>

<noscript>
  <div style="position:fixed; top:0; left:0; width:100%; height:100%; background:#000; color:#00f7ff; z-index:9999; display:flex; align-items:center; justify-content:center; font-family:sans-serif; text-align:center;">
    <h1>SECURITY ALERT</h1>
    <p>JavaScript is required to access Isolophilia Community.<br>Please enable it to continue.</p>
  </div>
</noscript>

  <!-- HEADER START -->
  <header class="chat-header">
    <div class="header-left">
      <div class="logo">
        <img src="logo.png" alt="Logo">
      </div>
      <div class="title-box">
        <div class="title-row">
          <h1>ISOLOPHILIA COMMUNITY</h1>
          <span class="badge beta">Beta</span>
          <span class="badge version">v1.09</span>
        </div>
        <p class="live-status">
          Online: <span id="online">0 Live</span>
         <span class="online-dot hidden" id="onlineDot"></span>       
        </p>
      </div>
    </div>
 <!--   <div class="menu">⋮</div> -->
<div class="menu">
  ⋮
  <div class="menu-dropdown">
    <button id="toggleSidebar">
      <i class="fa-solid fa-users"></i> Member List
    </button>
    <button id="openBanListBtn" style="color: #00f7ff; font-weight: bold;">
    <i class="fa-solid fa-users-gear"></i> Manage Users
</button>
    <button id="logoutBtn"> <!--Logout</button> -->
    <i class="fa-solid fa-right-from-bracket"></i>
   Logout</button>
  </div>
</div>
  </header>
  <!-- HEADER END -->
   <p id="dateDisplay" style="text-align: center; color: #fff; font-size: 14px; margin-top: 10px;"></p>
  <!-- CHAT AREA START -->
  <div class="chat-wrapper">
    
    <aside class="sidebar">
<div class="sidebar-header" id="sidebarOnlineHeader">
    <i class="fa-solid fa-users"></i> Online Users
</div>
      <div class="sidebar-content">
        </div>
    </aside>
    <div class="chat-bg">
      <div id="chat" class="chat"></div>
      <button id="newMsgBtn" class="hidden">
        <i class="fa-regular fa-turn-down"></i>
      </button>
</div>
</div>
  <div class="input-container" style="position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); width: calc(100% - 24px); max-width: 480px; z-index: 1000;">
    <div id="replyPreview" class="reply-preview hidden">
        <div class="reply-content">
            <span id="replyUser"></span>
            <p id="replyText"></p>
        </div>
        <button id="cancelReply">×</button>
    </div>

    <div class="input-bar" style="position: relative; bottom: 0; left: -8px; transform: none; width: 100%;">
        <input type="text" id="messageInput" placeholder="Type a message..."/>
        <div class="sendBtn">
            <button id="sendBtn">
                <i class="fa-solid fa-paper-plane"></i>
            </button>
        </div>
    </div>
  </div>

<script src="/app.js"></script>
<div id="userModal" class="modal hidden">
  <div class="modal-content">
    <div class="modal-banner"></div> <div class="modal-body">
      <img id="modalAvatar" src="" alt="User">
      <h2 id="modalName">User Name</h2>
      <p id="modalEmail">user@example.com</p>
       <div id="adminActions"></div> 
      <button id="closeModal">Back to Chat</button>
    </div>
  </div>
</div>

<div id="banListModal" class="hidden" style="position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 15px; backdrop-filter: blur(5px);">
    <div style="background: #111827; width: 100%; max-width: 750px; border-radius: 20px; border: 1px solid #374151; padding: 20px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);">
        
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #1f2937; padding-bottom: 15px;">
            <div style="display: flex; align-items: center; gap: 12px;">
                <div style="background: rgba(0, 247, 255, 0.1); padding: 8px; border-radius: 10px;">
                    <i class="fa-solid fa-users-gear" style="color: #00f7ff; font-size: 1.5rem;"></i>
                </div>
                <div>
                    <h3 style="color: #f3f4f6; margin: 0; font-size: 1.25rem; font-weight: 700;">Manage Users</h3>
                    <p style="color: #6b7280; margin: 0; font-size: 0.8rem;">Control all community members</p>
                </div>
            </div>
            <button id="closeBanList" style="background: #1f2937; border: none; color: #9ca3af; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.3s;">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>

        <div style="position: relative; margin-bottom: 20px;">
            <i class="fa-solid fa-magnifying-glass" style="position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #4b5563;"></i>
            <input type="text" id="userSearch" placeholder="Search by name or email..." 
                   style="width: 100%; padding: 12px 12px 12px 40px; background: #030712; border: 1px solid #1f2937; border-radius: 12px; color: white; outline: none; transition: 0.3s; font-size: 0.9rem;">
        </div>

        <div style="max-height: 400px; overflow-y: auto; border-radius: 12px; border: 1px solid #1f2937; background: #030712;">
            <table style="width: 100%; border-collapse: collapse; text-align: left;">
                <thead style="position: sticky; top: 0; background: #1f2937; color: #9ca3af; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em;">
                    <tr>
                        <th style="padding: 12px 15px;">Member</th>
                        <th style="padding: 12px 15px; text-align: center;">Quick Actions</th>
                    </tr>
                </thead>
                <tbody id="banListContent" style="color: #e5e7eb; font-size: 0.9rem;">
                    <tr id="tableLoader">
                        <td colspan="2" style="text-align: center; padding: 40px; color: #4b5563;">
                            <i class="fa-solid fa-circle-notch fa-spin"></i> Loading members...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>


</body> 
</html>
